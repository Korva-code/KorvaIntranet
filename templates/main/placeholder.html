{% extends 'maestras/base.html' %}

{% block content %}
<div class="placeholder-page">
  <div class="placeholder-icon">
    <i class="bi {{ icon | default('bi-grid') }}"></i>
  </div>
  <h4 class="mt-3 mb-2">{{ page }}</h4>
  <p class="text-muted">
    Este módulo está en construcción.<br />
    Aquí irá la vista completa de <strong>{{ page }}</strong>.
  </p>
  <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary mt-2">
    <i class="bi bi-arrow-left me-2"></i> Volver al Dashboard
  </a>
</div>
{% endblock %}
