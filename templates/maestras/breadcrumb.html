<div class="intranet-breadcrumb">
  <div class="d-flex align-items-center justify-content-between">
    <div>
      <h5 class="page-title mb-0">{{ title }}</h5>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0 mt-1">
          <li class="breadcrumb-item">
            <a href="{{ url_for('main.dashboard') }}">
              <i class="bi bi-house-fill"></i>
            </a>
          </li>
          {% if section is defined and section %}
            <li class="breadcrumb-item text-muted">{{ section }}</li>
          {% endif %}
          <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
        </ol>
      </nav>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="text-muted small d-none d-sm-block">
        <i class="bi bi-calendar3 me-1"></i>
        <span id="currentDate"></span>
      </span>
      {% block breadcrumb_actions %}{% endblock %}
    </div>
  </div>
</div>
